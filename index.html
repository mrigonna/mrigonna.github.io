<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Für dich</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

</head>
<body>


<section id="page1" class="page active">

    <h1 class="text">
        Wer glaubst du ist die beste Freundin auf der Welt?
    </h1>

    <div class="buttons">

        <button id="yesBtn" class="glass">
            Ich
        </button>

        <button id="noBtn" class="glass">
            Ich nicht
        </button>

    </div>

</section>



<section id="page2" class="page">

    <h1 class="text">

        Ich habe zwar keinen Blumenstrauß,
        aber ich möchte dir etwas schenken,
        was du definitiv noch nie bekommen hast.

    </h1>

    <button id="nextBtn" class="glass">
        Was denn?
    </button>

</section>



<section id="page3" class="page">

    <h1 class="text">
        Unendlich viele Rosen
    </h1>

    <button id="rainBtn" class="glass">
        Zeig mir
    </button>

</section>


<div id="roseContainer"></div>


<script src="script.js"></script>

</body>
</html>
